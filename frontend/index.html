<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PriceCatch Dashboard</title>
    
    <!-- React & ReactDOM (Development version for standalone Babel) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    
    <!-- Babel for on-the-fly JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="bg-gray-100 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        const API_KEY = "dev-key-12345"; // Default seeded key

        function App() {
            const [activeTab, setActiveTab] = useState('products');
            const [loading, setLoading] = useState(false);
            
            const handleRefresh = async () => {
                setLoading(true);
                try {
                    const res = await fetch('/api/refresh', {
                        method: 'POST',
                        headers: { 'X-API-Key': API_KEY }
                    });
                    const data = await res.json();
                    alert(`Refresh Complete!\nInserted: ${data.inserted}\nUpdated: ${data.updated}\nPrice Changes: ${data.price_changes}`);
                    window.location.reload();
                } catch (e) {
                    alert("Error refreshing data");
                }
                setLoading(false);
            };

            return (
                <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
                    <div className="flex justify-between items-center mb-8">
                        <h1 className="text-3xl font-bold text-gray-900">PriceCatch Dashboard</h1>
                        <button 
                            onClick={handleRefresh}
                            disabled={loading}
                            className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded shadow disabled:opacity-50"
                        >
                            {loading ? 'Refreshing...' : 'Refresh Data'}
                        </button>
                    </div>

                    <div className="border-b border-gray-200 mb-6">
                        <nav className="-mb-px flex space-x-8">
                            <button onClick={() => setActiveTab('products')} className={`py-4 px-1 border-b-2 font-medium text-sm ${activeTab === 'products' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}>Products</button>
                            <button onClick={() => setActiveTab('analytics')} className={`py-4 px-1 border-b-2 font-medium text-sm ${activeTab === 'analytics' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}>Analytics</button>
                            <button onClick={() => setActiveTab('webhooks')} className={`py-4 px-1 border-b-2 font-medium text-sm ${activeTab === 'webhooks' ? 'border-blue-500 text-blue-600' : 'border-transparent text-gray-500 hover:text-gray-700 hover:border-gray-300'}`}>Webhooks</button>
                        </nav>
                    </div>

                    <div className="mt-4">
                        {activeTab === 'products' && <ProductsView />}
                        {activeTab === 'analytics' && <AnalyticsView />}
                        {activeTab === 'webhooks' && <WebhooksView />}
                    </div>
                </div>
            );
        }

        function ProductsView() {
            const [products, setProducts] = useState({ items: [], total: 0, page: 1, pages: 1 });
            const [page, setPage] = useState(1);

            useEffect(() => {
                fetchProducts(page);
            }, [page]);

            const fetchProducts = async (pageNumber) => {
                const res = await fetch(`/api/products?page=${pageNumber}&page_size=12`, {
                    headers: { 'X-API-Key': API_KEY }
                });
                const data = await res.json();
                setProducts(data);
            };

            return (
                <div>
                    <h2 className="text-xl font-semibold mb-4">Product Catalog (Total: {products.total})</h2>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                        {products.items.map(p => (
                            <div key={p.id} className="bg-white overflow-hidden shadow rounded-lg flex flex-col">
                                {p.image_url ? (
                                    <img src={p.image_url} alt={p.model} className="h-48 w-full object-cover" />
                                ) : (
                                    <div className="h-48 w-full bg-gray-200 flex items-center justify-center text-gray-500">No Image</div>
                                )}
                                <div className="p-4 flex-1 flex flex-col justify-between">
                                    <div>
                                        <div className="text-xs font-semibold text-blue-600 uppercase tracking-wide">{p.source} &bull; {p.category}</div>
                                        <h3 className="mt-1 text-lg font-medium text-gray-900">{p.brand}</h3>
                                        <p className="mt-1 text-sm text-gray-500 truncate">{p.model}</p>
                                    </div>
                                    <div className="mt-4 flex items-center justify-between">
                                        <span className="text-xl font-bold text-gray-900">${p.current_price.toFixed(2)}</span>
                                        <a href={p.product_url} target="_blank" className="text-sm text-blue-600 hover:text-blue-800">View Source &rarr;</a>
                                    </div>
                                </div>
                            </div>
                        ))}
                    </div>
                    {products.pages > 1 && (
                        <div className="mt-8 flex justify-center space-x-2">
                            <button onClick={() => setPage(p => Math.max(1, p - 1))} disabled={page === 1} className="px-4 py-2 border rounded-md disabled:opacity-50">Prev</button>
                            <span className="px-4 py-2 text-gray-700">Page {page} of {products.pages}</span>
                            <button onClick={() => setPage(p => Math.min(products.pages, p + 1))} disabled={page === products.pages} className="px-4 py-2 border rounded-md disabled:opacity-50">Next</button>
                        </div>
                    )}
                </div>
            );
        }

        function AnalyticsView() {
            const [stats, setStats] = useState(null);

            useEffect(() => {
                fetch('/api/analytics/summary', { headers: { 'X-API-Key': API_KEY } })
                    .then(res => res.json())
                    .then(data => setStats(data));
            }, []);

            if (!stats) return <div>Loading analytics...</div>;

            return (
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div className="bg-white p-6 rounded-lg shadow">
                        <h3 className="text-lg font-medium text-gray-900 mb-4">Overview</h3>
                        <dl className="grid grid-cols-2 gap-4">
                            <div>
                                <dt className="text-sm font-medium text-gray-500">Total Products</dt>
                                <dd className="mt-1 text-3xl font-semibold text-gray-900">{stats.total_products}</dd>
                            </div>
                            <div>
                                <dt className="text-sm font-medium text-gray-500">Price History Records</dt>
                                <dd className="mt-1 text-3xl font-semibold text-gray-900">{stats.total_price_history_records}</dd>
                            </div>
                            <div>
                                <dt className="text-sm font-medium text-gray-500">Price Changes (24h)</dt>
                                <dd className="mt-1 text-3xl font-semibold text-gray-900">{stats.price_changes_last_24h}</dd>
                            </div>
                        </dl>
                    </div>
                    
                    <div className="bg-white p-6 rounded-lg shadow">
                        <h3 className="text-lg font-medium text-gray-900 mb-4">By Source</h3>
                        <ul className="space-y-3">
                            {Object.entries(stats.by_source).map(([source, count]) => (
                                <li key={source} className="flex justify-between">
                                    <span className="text-gray-600 capitalize">{source}</span>
                                    <span className="font-semibold">{count} items</span>
                                </li>
                            ))}
                        </ul>
                    </div>

                    <div className="bg-white p-6 rounded-lg shadow md:col-span-2">
                        <h3 className="text-lg font-medium text-gray-900 mb-4">Average Prices</h3>
                        <div className="grid grid-cols-2 md:grid-cols-3 gap-4">
                            {Object.entries(stats.avg_price_by_category).map(([cat, avg]) => (
                                <div key={cat} className="border rounded p-3">
                                    <div className="text-xs text-gray-500 capitalize">{cat}</div>
                                    <div className="font-semibold text-lg">${avg.toFixed(2)}</div>
                                </div>
                            ))}
                        </div>
                    </div>
                </div>
            );
        }

        function WebhooksView() {
            const [webhooks, setWebhooks] = useState([]);
            const [logs, setLogs] = useState([]);
            const [url, setUrl] = useState('');
            const [secret, setSecret] = useState('');

            useEffect(() => {
                fetchWebhooks();
                fetchLogs();
            }, []);

            const fetchWebhooks = async () => {
                const res = await fetch('/api/webhooks', { headers: { 'X-API-Key': API_KEY } });
                setWebhooks(await res.json());
            };

            const fetchLogs = async () => {
                const res = await fetch('/api/webhooks/log', { headers: { 'X-API-Key': API_KEY } });
                setLogs(await res.json());
            };

            const addWebhook = async (e) => {
                e.preventDefault();
                await fetch('/api/webhooks', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json', 'X-API-Key': API_KEY },
                    body: JSON.stringify({ url, secret: secret || null })
                });
                setUrl('');
                setSecret('');
                fetchWebhooks();
            };

            const deleteWebhook = async (id) => {
                await fetch(`/api/webhooks/${id}`, { method: 'DELETE', headers: { 'X-API-Key': API_KEY }});
                fetchWebhooks();
            };

            return (
                <div className="space-y-8">
                    <div className="bg-white p-6 rounded-lg shadow">
                        <h3 className="text-lg font-medium text-gray-900 mb-4">Add Webhook</h3>
                        <form onSubmit={addWebhook} className="flex gap-4 items-end">
                            <div className="flex-1">
                                <label className="block text-sm font-medium text-gray-700">URL</label>
                                <input type="url" required value={url} onChange={e => setUrl(e.target.value)} className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2" placeholder="https://my-domain.com/webhook" />
                            </div>
                            <div className="flex-1">
                                <label className="block text-sm font-medium text-gray-700">Secret (Optional)</label>
                                <input type="text" value={secret} onChange={e => setSecret(e.target.value)} className="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-blue-500 focus:ring-blue-500 sm:text-sm border p-2" placeholder="Secret for HMAC" />
                            </div>
                            <button type="submit" className="bg-blue-600 text-white px-4 py-2 rounded-md hover:bg-blue-700 mb-0.5">Add</button>
                        </form>

                        <div className="mt-6">
                            <h4 className="text-md font-medium mb-2">Active Subscriptions</h4>
                            {webhooks.length === 0 ? <p className="text-gray-500 text-sm">No webhooks configured.</p> : (
                                <ul className="divide-y divide-gray-200">
                                    {webhooks.map(w => (
                                        <li key={w.id} className="py-3 flex justify-between items-center">
                                            <span className="text-sm font-mono text-gray-800">{w.url}</span>
                                            <button onClick={() => deleteWebhook(w.id)} className="text-red-600 hover:text-red-900 text-sm">Delete</button>
                                        </li>
                                    ))}
                                </ul>
                            )}
                        </div>
                    </div>

                    <div className="bg-white p-6 rounded-lg shadow">
                        <h3 className="text-lg font-medium text-gray-900 mb-4">Recent Delivery Logs</h3>
                        <div className="overflow-x-auto">
                            <table className="min-w-full divide-y divide-gray-200">
                                <thead className="bg-gray-50">
                                    <tr>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Date</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Attempts</th>
                                        <th className="px-6 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Details</th>
                                    </tr>
                                </thead>
                                <tbody className="bg-white divide-y divide-gray-200">
                                    {logs.map(lg => (
                                        <tr key={lg.id}>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{new Date(lg.created_at).toLocaleString()}</td>
                                            <td className="px-6 py-4 whitespace-nowrap">
                                                <span className={`px-2 inline-flex text-xs leading-5 font-semibold rounded-full ${lg.status === 'delivered' ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                                    {lg.status}
                                                </span>
                                            </td>
                                            <td className="px-6 py-4 whitespace-nowrap text-sm text-gray-500">{lg.attempts}</td>
                                            <td className="px-6 py-4 text-sm text-gray-500 font-mono text-xs max-w-xs truncate">{lg.payload}</td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
